<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiết lập địa chỉ - TechZone</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body style="background-color: var(--bg-color);">

    <header class="header">
        <div class="container" style="display: flex; justify-content: center; padding: 15px 20px;">
            <a href="/" class="logo">
                <span class="logo-icon">📱</span> TechZone
            </a>
        </div>
    </header>

    <main class="section">
        <div class="container" style="max-width: 500px; margin: 0 auto;">
            <div style="background: var(--white); padding: 40px; border-radius: var(--radius); box-shadow: var(--shadow-lg);">
                
                <div style="text-align: center; margin-bottom: 30px;">
                    <div style="font-size: 3rem; margin-bottom: 10px;">📍</div>
                    <h2 style="color: var(--primary-color);">Cập nhật địa chỉ nhận hàng</h2>
                    <p style="color: var(--text-light); font-size: 0.95rem; margin-top: 5px;">
                        Thêm địa chỉ giao hàng để mua sắm nhanh chóng hơn. Bạn có thể bỏ qua và thêm sau.
                    </p>
                </div>

                <div id="address-alert" class="form-error" style="background: #fef2f2; padding: 12px; border-radius: var(--radius); margin-bottom: 20px; border: 1px solid #fca5a5;"></div>

                <form id="address-form" onsubmit="event.preventDefault(); handleSaveAddress();">
                    <div class="form-group">
                        <label for="receiver_name">Tên người nhận <span style="color: #ef4444;">*</span></label>
                        <input type="text" id="receiver_name" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label for="receiver_phone">Số điện thoại nhận hàng <span style="color: #ef4444;">*</span></label>
                        <input type="tel" id="receiver_phone" class="form-control" placeholder="VD: 0901234567" required>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="form-group">
                            <label>Tỉnh / Thành phố <span style="color: #ef4444;">*</span></label>
                            <select id="province" class="form-control" required onchange="loadDistricts()">
                                <option value="">Chọn Tỉnh thành</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Quận / Huyện <span style="color: #ef4444;">*</span></label>
                            <select id="district" class="form-control" required onchange="loadWards()" disabled>
                                <option value="">Chọn Quận huyện</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Phường / Xã <span style="color: #ef4444;">*</span></label>
                        <select id="ward" class="form-control" required disabled>
                            <option value="">Chọn Phường xã</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="address">Địa chỉ chi tiết <span style="color: #ef4444;">*</span></label>
                        <input type="text" id="address" class="form-control" placeholder="Số nhà, hẻm, tên đường..." required>
                    </div>

                    <div style="display: flex; gap: 15px; margin-top: 30px;">
                        <button type="button" class="btn" style="flex: 1; background: #f3f4f6; color: var(--text-color); border: 1px solid var(--border-color);" onclick="skipAddress()">
                            Bỏ qua lúc này
                        </button>
                        <button type="submit" class="btn btn-primary" id="btn-save-address" style="flex: 1;">
                            Lưu địa chỉ
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </main>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>

//----- CẤU HÌNH API GHN-----
let GHN_TOKEN = '';
let GHN_API_URL = '';

document.addEventListener('DOMContentLoaded', async () => {
    if (!isLoggedIn()) {
        window.location.href = '/login.html';
        return;
    }

    const user = getCurrentUser();
    if (user && user.name) {
        document.getElementById('receiver_name').value = user.name;
    }

    // TẢI CẤU HÌNH TỪ SERVER 
            await loadAppConfig();

    // SAU KHI CÓ TOKEN THÌ MỚI GỌI API GHN
    if (GHN_TOKEN) {
        loadProvinces();
    }
});

async function loadAppConfig() {
    try {
        const result = await apiRequest('/public-config')
        
        if (result.data) {
            GHN_TOKEN = result.data.ghn_token;
            GHN_API_URL = result.data.ghn_api_url;
        }
    } catch (error) {
        console.error('Không thể tải cấu hình hệ thống:', error);
    }
}

// --- CÁC HÀM GỌI API TỈNH/QUẬN/PHƯỜNG,XÃ ---
async function loadProvinces() {
    try {
        const res = await fetch(`${GHN_API_URL}/province`, {
            headers: { 'Token': GHN_TOKEN, 'Content-Type': 'application/json' }
        });
        const data = await res.json();
        const select = document.getElementById('province');
        data.data.forEach(p => p.ProvinceID < 270 ? select.innerHTML += `<option value="${p.ProvinceID}">${p.ProvinceName}</option>`
        : '');
    } catch (error) { console.error('Lỗi tải Tỉnh:', error); }
}

async function loadDistricts() {
    const provinceId = document.getElementById('province').value;
    const distSelect = document.getElementById('district');
    const wardSelect = document.getElementById('ward');
    
    distSelect.innerHTML = '<option value="">Chọn Quận huyện</option>';
    wardSelect.innerHTML = '<option value="">Chọn Phường xã</option>';
    wardSelect.disabled = true;

    if (!provinceId) { distSelect.disabled = true; return; }

    try {
        const res = await fetch(`${GHN_API_URL}/district`, {
            method: 'POST',
            headers: { 'token': GHN_TOKEN, 'Content-Type': 'application/json' },
            body: JSON.stringify({ province_id: parseInt(provinceId) })
        });
        const data = await res.json();
        data.data.forEach(d => distSelect.innerHTML += `<option value="${d.DistrictID}">${d.DistrictName}</option>`);
        distSelect.disabled = false;
    } catch (error) { console.error('Lỗi tải Quận:', error); }
}

async function loadWards() {
    const districtId = document.getElementById('district').value;
    const wardSelect = document.getElementById('ward');
    wardSelect.innerHTML = '<option value="">Chọn Phường xã</option>';

    if (!districtId) { wardSelect.disabled = true; return; }

    try {
        const res = await fetch(`${GHN_API_URL}/ward?district_id=${districtId}`, {
            headers: { 'token': GHN_TOKEN }
        });
        const data = await res.json();
        data.data.forEach(w => wardSelect.innerHTML += `<option value="${w.WardCode}">${w.WardName}</option>`);
        wardSelect.disabled = false;
    } catch (error) { console.error('Lỗi tải Phường:', error); }
}

async function handleSaveAddress() {
    const receiver_name = document.getElementById('receiver_name').value.trim();
    const receiver_phone = document.getElementById('receiver_phone').value.trim();
    const address = document.getElementById('address').value.trim();
    
    const provEl = document.getElementById('province');
    const distEl = document.getElementById('district');
    const wardEl = document.getElementById('ward');

    const province_id = provEl.value;
    const district_id = distEl.value;
    const ward_code = wardEl.value;
    const province_name = provEl.options[provEl.selectedIndex].text;
    const district_name = distEl.options[distEl.selectedIndex].text;
    const ward_name = wardEl.options[wardEl.selectedIndex].text;

    const btn = document.getElementById('btn-save-address');
    const alertBox = document.getElementById('address-alert');

    alertBox.classList.remove('show');
    btn.disabled = true;
    btn.textContent = 'Đang lưu...';

    try {
        const payload = {
            receiver_name, receiver_phone, address,
            province_id, district_id, ward_code,
            province_name, district_name, ward_name
        };

        await apiRequest('/storefront/addresses', {
            method: 'POST',
            body: JSON.stringify(payload)
        });

        alert('Lưu địa chỉ thành công! Bắt đầu mua sắm thôi.');
        window.location.href = '/';
    } catch (err) {
        alertBox.textContent = err.data?.message || 'Lỗi khi lưu địa chỉ. Vui lòng kiểm tra lại thông tin.';
        alertBox.classList.add('show');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Lưu địa chỉ';
    }
}

function skipAddress() {
    window.location.href = '/';
}
</script>
</body>
</html>
