<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiết lập tài khoản - TechZone</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-card {
            background: var(--white);
            border-radius: 14px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            padding: 24px;
            margin-bottom: 24px;
        }
        .profile-card h3 {
            margin-bottom: 20px;
            font-size: 1.25rem;
            color: var(--primary-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }
        
        /* Sidebar Nav Styles */
        .sidebar-nav-btn {
            font-size: 1rem;
            text-align: left;
            background: #f8fafc;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            margin-top: 8px;
            transition: all 0.2s ease;
        }
        .sidebar-nav-btn:hover { background: #e2e8f0; }
        .sidebar-nav-btn.active {
            background: var(--primary-color) !important;
            color: white !important;
            border-color: var(--primary-color) !important;
        }

        /* Panel Toggling */
        .section-panel { display: none; animation: fadeIn 0.3s ease; }
        .section-panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Address Item Styles */
        .address-item-profile {
            padding: 16px; border: 1px solid var(--border-color); border-radius: 10px; margin-bottom: 16px; position: relative;
        }
        .address-item-profile.default { border-color: var(--primary-color); background: #f0fdfa; }
        .address-actions { position: absolute; top: 16px; right: 16px; display: flex; gap: 10px; }
        .badge-default { background: var(--primary-color); color: white; padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; }
        .btn-text { background: none; border: none; color: var(--primary-color); font-weight: 600; cursor: pointer; }
        .btn-text.danger { color: #dc2626; }
        .btn-text:hover { text-decoration: underline; }
        .d-none { display: none !important; }
    </style>
</head>
<body>
    <div id="storefront-header-root"></div>

    <main class="section products-shell">
        <div class="container products-desktop-layout">
            
            <aside class="products-sidebar">
                <div style="text-align: center; margin-bottom: 20px;">
                    <div style="width: 64px; height: 64px; background: var(--primary-color); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0 auto 10px;">
                        👤
                    </div>
                    <h4 id="sidebar-user-name" style="margin: 0;">Đang tải...</h4>
                </div>
                <hr style="border:0; border-top: 1px solid var(--border-color); margin-bottom: 16px;">
                <div class="sidebar-filter-group">
                    <button class="btn w-100 sidebar-nav-btn active" data-target="info-section">📝 Thông tin cá nhân</button>
                    <button class="btn w-100 sidebar-nav-btn" data-target="address-section">📍 Sổ địa chỉ</button>
                    <button class="btn w-100 sidebar-nav-btn" data-target="password-section">🔑 Đổi mật khẩu</button>
                </div>
            </aside>

            <div class="products-main" style="border: none; padding: 0;">
                
                <div class="profile-card section-panel active" id="info-section">
                    <h3>Thông tin cá nhân</h3>
                    <form id="profile-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Họ và tên</label>
                                <input type="text" id="profile-name" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Số điện thoại</label>
                                <input type="text" id="profile-phone" class="form-control" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Email (Không thể thay đổi)</label>
                            <input type="email" id="profile-email" class="form-control" disabled style="background-color: #f1f5f9; cursor: not-allowed;">
                        </div>
                        <button type="submit" class="btn btn-login-form" id="btn-save-profile">Lưu thay đổi</button>
                    </form>
                </div>

                <div class="profile-card section-panel" id="address-section">
                    
                    <div id="address-list-view">
                        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 20px;">
                            <h3 style="border: none; padding: 0; margin: 0;">Sổ địa chỉ</h3>
                            <button class="btn btn-secondary" style="padding: 6px 16px; font-size: 0.9rem;" onclick="toggleAddressForm(true)">+ Thêm địa chỉ mới</button>
                        </div>
                        <div id="address-list-container">
                            <div class="loading">Đang tải địa chỉ...</div>
                        </div>
                    </div>

                    <div id="address-form-view" class="d-none">
                        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 20px;">
                            <h3 style="border: none; padding: 0; margin: 0;" id="address-form-title">Thêm địa chỉ mới</h3>
                            <button class="btn btn-text" onclick="toggleAddressForm(false)">← Quay lại</button>
                        </div>

                        <div id="address-alert" class="form-error" style="background: #fef2f2; padding: 12px; border-radius: var(--radius); margin-bottom: 20px; border: 1px solid #fca5a5; display: none;"></div>

                        <form id="address-form" onsubmit="event.preventDefault(); handleSaveAddress();">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Tên người nhận <span style="color: #ef4444;">*</span></label>
                                    <input type="text" id="address_receiver_name" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label>Số điện thoại <span style="color: #ef4444;">*</span></label>
                                    <input type="tel" id="address_receiver_phone" class="form-control" required>
                                </div>
                            </div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                                <div class="form-group">
                                    <label>Tỉnh / Thành phố <span style="color: #ef4444;">*</span></label>
                                    <select id="province" class="form-control" required onchange="loadDistricts()">
                                        <option value="">Chọn Tỉnh thành</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Quận / Huyện <span style="color: #ef4444;">*</span></label>
                                    <select id="district" class="form-control" required onchange="loadWards()" disabled>
                                        <option value="">Chọn Quận huyện</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Phường / Xã <span style="color: #ef4444;">*</span></label>
                                <select id="ward" class="form-control" required disabled>
                                    <option value="">Chọn Phường xã</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Địa chỉ chi tiết <span style="color: #ef4444;">*</span></label>
                                <input type="text" id="address_detail" class="form-control" placeholder="Số nhà, hẻm, tên đường..." required>
                            </div>
                            <button type="submit" class="btn btn-login-form" id="btn-save-address">Lưu địa chỉ</button>
                        </form>
                    </div>

                </div>

                <div class="profile-card section-panel" id="password-section">
                    <h3>Đổi mật khẩu</h3>
                    <form id="password-form">
                        <div class="form-group">
                            <label>Mật khẩu hiện tại</label>
                            <input type="password" id="current-password" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Mật khẩu mới</label>
                            <input type="password" id="new-password" class="form-control" minlength="8" required>
                        </div>
                        <div class="form-group">
                            <label>Xác nhận mật khẩu mới</label>
                            <input type="password" id="confirm-password" class="form-control" minlength="8" required>
                        </div>
                        <button type="submit" class="btn btn-login-form" id="btn-save-password">Cập nhật mật khẩu</button>
                    </form>
                </div>

            </div>
        </div>
    </main>

    <div id="storefront-footer-root"></div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/app-layout.js"></script>
    <script src="js/profile.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initStorefrontLayout({ activePage: 'profile' });
        });
    </script>
</body>
</html>
