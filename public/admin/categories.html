<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loại sản phẩm - TechZone Admin</title>
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="icon" href="../favicon.ico">
</head>

<body>
<div class="admin-layout">

    <div id="admin-sidebar-root"></div>

    <!-- ===== MAIN ===== -->
    <div class="admin-main">
        <div id="admin-topbar-root"></div>

        <main class="admin-content">
            <div class="page-header">
                <h1>Quản lý Loại sản phẩm</h1>
                <p>Thêm, sửa, xóa các loại sản phẩm trong hệ thống</p>
            </div>

            <div class="card">
                <!-- Toolbar -->
                <div class="card-header">
                    <div class="toolbar">
                        <div class="search-box">
                            <span>🔍</span>
                            <input type="text" id="search-input" placeholder="Tìm kiếm theo tên...">
                        </div>
                        <button class="btn-add" onclick="openAddModal()">
                            ＋ Thêm loại mới
                        </button>
                    </div>
                </div>

                <!-- Table -->
                <div class="table-wrapper">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th style="width:60px">#</th>
                                <th>Tên loại sản phẩm</th>
                                <th>Ngày tạo</th>
                                <th style="width:140px; text-align:center">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="category-table-body">
                            <tr>
                                <td colspan="4" class="table-loading">⏳ Đang tải dữ liệu...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="pagination" id="pagination-bar" style="display:none">
                    <div class="pagination-info" id="pagination-info"></div>
                    <div class="pagination-btns" id="pagination-btns"></div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- ===== MODAL: Add / Edit Category ===== -->
<div class="modal-overlay-form" id="form-modal">
    <div class="modal-form-box">
        <div class="modal-form-header">
            <span class="modal-form-title" id="modal-title">Thêm loại sản phẩm</span>
            <button class="modal-close-btn" onclick="closeFormModal()">✕</button>
        </div>
        <div class="modal-form-body">
            <div class="form-group">
                <label for="cat-name">Tên loại sản phẩm <span style="color:var(--admin-danger)">*</span></label>
                <div class="input-wrapper">
                    <span class="input-icon">📂</span>
                    <input type="text" id="cat-name" class="form-control" placeholder="VD: Điện thoại, Laptop...">
                </div>
                <div id="cat-name-error" class="field-error"></div>
            </div>
        </div>
        <div class="modal-form-footer">
            <button class="btn btn-cancel" onclick="closeFormModal()">Hủy</button>
            <button class="btn-save" id="save-btn" onclick="saveCategory()">
                <span id="save-spinner" class="spinner"></span>
                <span id="save-btn-text">Lưu</span>
            </button>
        </div>
    </div>
</div>

<!-- ===== MODAL: Confirm Delete ===== -->
<div class="modal-overlay" id="delete-modal">
    <div class="modal-box">
        <div class="modal-icon">🗑️</div>
        <div class="modal-title">Xác nhận xóa</div>
        <div class="modal-message">
            Bạn có chắc muốn xóa loại sản phẩm
            <strong id="delete-name"></strong>?<br>
            <small style="color:var(--admin-danger)">Không thể xóa nếu đang có sản phẩm thuộc loại này.</small>
        </div>
        <div class="modal-actions">
            <button class="btn btn-cancel" onclick="closeDeleteModal()">Hủy</button>
            <button class="btn btn-danger" id="confirm-delete-btn" onclick="doDelete()">Xóa</button>
        </div>
    </div>
</div>

<div class="toast" id="admin-toast"></div>

<script src="../js/admin/admin-token.js"></script>
<script src="../js/admin/admin-api.js"></script>
<script src="../js/admin/admin-auth.js"></script>
<script src="../js/admin/admin-layout.js"></script>
<script src="../js/admin/admin-utils.js"></script>
<script>
initAdminLayout({ title: 'Loại sản phẩm', icon: '📂', activePage: 'categories' });

// ============================================================
// State
// ============================================================
let currentPage   = 1;
let totalPages    = 1;
let searchTimeout = null;
let editingId     = null;
let deletingId    = null;

// ============================================================
// Init
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
    loadCategories();

    document.getElementById('search-input').addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            currentPage = 1;
            loadCategories();
        }, 400);
    });
});

// ============================================================
// Load & Render
// ============================================================
async function loadCategories() {
    const search = document.getElementById('search-input').value.trim();
    const params = new URLSearchParams({ page: currentPage, per_page: 10 });
    if (search) params.append('search', search);

    setTableLoading(true);

    try {
        const res = await adminRequest(`/categories?${params}`);
        renderTable(res.data.data ?? res.data);
        totalPages = renderPagination({
            meta: res.data.meta ?? res.data,
            currentPage,
            onPageChange: (p) => { currentPage = p; loadCategories(); }
        });
    } catch (err) {
        showTableError('Không thể tải dữ liệu. Vui lòng thử lại.');
    }
}

function renderTable(items) {
    const tbody = document.getElementById('category-table-body');

    if (!items || items.length === 0) {
        tbody.innerHTML = `
            <tr>
                <td colspan="4">
                    <div class="table-empty">
                        <div class="table-empty-icon">📂</div>
                        <div class="table-empty-text">Chưa có loại sản phẩm nào</div>
                    </div>
                </td>
            </tr>`;
        return;
    }

    tbody.innerHTML = items.map(cat => `
        <tr>
            <td class="td-id">${cat.id}</td>
            <td class="td-name">${escHtml(cat.name)}</td>
            <td style="color:var(--text-secondary); font-size:0.8rem">${formatDate(cat.created_at)}</td>
            <td>
                <div class="td-actions" style="justify-content:center">
                    <button class="btn-edit" onclick="openEditModal(${cat.id}, '${escJs(cat.name)}')">✏️ Sửa</button>
                    <button class="btn-delete" onclick="openDeleteModal(${cat.id}, '${escJs(cat.name)}')">🗑️ Xóa</button>
                </div>
            </td>
        </tr>
    `).join('');
}


function setTableLoading(on) {
    if (on) {
        document.getElementById('category-table-body').innerHTML =
            `<tr><td colspan="4" class="table-loading">⏳ Đang tải...</td></tr>`;
        document.getElementById('pagination-bar').style.display = 'none';
    }
}

function showTableError(msg) {
    document.getElementById('category-table-body').innerHTML =
        `<tr><td colspan="4" class="table-loading" style="color:var(--admin-danger)">⚠️ ${msg}</td></tr>`;
}

function openAddModal() {
    editingId = null;
    document.getElementById('modal-title').textContent = 'Thêm loại sản phẩm';
    document.getElementById('cat-name').value = '';
    clearFieldError('cat-name');
    document.getElementById('form-modal').classList.add('show');
    setTimeout(() => document.getElementById('cat-name').focus(), 100);
}

function openEditModal(id, name) {
    editingId = id;
    document.getElementById('modal-title').textContent = 'Sửa loại sản phẩm';
    document.getElementById('cat-name').value = name;
    clearFieldError('cat-name');
    document.getElementById('form-modal').classList.add('show');
    setTimeout(() => document.getElementById('cat-name').focus(), 100);
}

function closeFormModal() { document.getElementById('form-modal').classList.remove('show'); }

async function saveCategory() {
    const name = document.getElementById('cat-name').value.trim();
    clearFieldError('cat-name');
    if (!name) { showFieldError('cat-name', 'Tên loại sản phẩm là bắt buộc'); return; }

    setSaveLoading(true);
    try {
        if (editingId) {
            await adminRequest(`/categories/${editingId}`, { method: 'PUT', body: JSON.stringify({ name }) });
            showAdminToast('Cập nhật loại sản phẩm thành công ✅');
        } else {
            await adminRequest('/categories', { method: 'POST', body: JSON.stringify({ name }) });
            showAdminToast('Thêm loại sản phẩm thành công ✅');
        }
        closeFormModal();
        currentPage = editingId ? currentPage : 1;
        loadCategories();
    } catch (err) {
        const errors = err?.data?.errors;
        showFieldError('cat-name', errors?.name?.[0] ?? err?.data?.message ?? 'Có lỗi xảy ra');
    } finally {
        setSaveLoading(false);
    }
}

document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('form-modal').classList.contains('show')) saveCategory();
    if (e.key === 'Escape') { closeFormModal(); closeDeleteModal(); }
});

function openDeleteModal(id, name) {
    deletingId = id;
    document.getElementById('delete-name').textContent = `"${name}"`;
    document.getElementById('delete-modal').classList.add('show');
}

function closeDeleteModal() {
    document.getElementById('delete-modal').classList.remove('show');
    deletingId = null;
}

async function doDelete() {
    if (!deletingId) return;
    const btn = document.getElementById('confirm-delete-btn');
    btn.disabled = true; btn.textContent = 'Đang xóa...';
    try {
        await adminRequest(`/categories/${deletingId}`, { method: 'DELETE' });
        showAdminToast('Xóa loại sản phẩm thành công ✅');
        closeDeleteModal();
        if (currentPage > 1 && document.querySelectorAll('#category-table-body tr').length === 1) currentPage--;
        loadCategories();
    } catch (err) {
        closeDeleteModal();
        const msg = err?.data?.message || 'Không thể xóa loại sản phẩm này';
        showAdminToast((err?.status === 409 ? '⛔ ' : '❌ ') + msg, 'error', 5000);
    } finally {
        btn.disabled = false; btn.textContent = 'Xóa';
    }
}
</script>
</body>
</html>
