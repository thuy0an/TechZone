<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TechZone - Cửa hàng công nghệ hàng đầu. Khám phá thiết bị điện tử chính hãng với giá cả cạnh tranh.">
    <title>TechZone - Cửa hàng Công Nghệ</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Header -->
    <div id="storefront-header-root"></div>

    <main>
        <!-- Hero Section -->
        <section class="hero">
            <div class="container">
                <h1>Chào mừng đến với <span class="highlight">TechZone</span></h1>
                <p>Khám phá những thiết bị công nghệ mới nhất và tốt nhất với giá cả cạnh tranh.</p>
                <a href="/products.html" class="btn btn-primary">Mua sắm ngay</a>
            </div>
        </section>

        <!-- Featured Products -->
        <section class="section" id="featured-products-section">
            <div class="container">
                <div class="section-header">
                    <h2 class="section-title">Sản phẩm nổi bật</h2>
                    <a href="/products.html" class="btn-view-all">Xem tất cả →</a>
                </div>
                <div id="featured-products" class="products-grid">
                    <div class="loading">Đang tải sản phẩm...</div>
                </div>
                <!-- Pagination -->
                <div id="pagination-container" class="pagination-wrapper pagination-right" style="display: none;"></div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <div id="storefront-footer-root"></div>

    <!-- Scripts -->
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/app-layout.js"></script>
<script src="/js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    initStorefrontLayout({ activePage: 'home' });
});
</script>
</body>

</html>
