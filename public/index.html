<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TechZone - Cửa hàng công nghệ hàng đầu">
    <title>TechZone - Cửa hàng Công Nghệ</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="favicon.ico">
</head>

<body>
    <!-- Header -->
    <div id="storefront-header-root"></div>

    <main>
        <!-- Hero Section -->
        <section class="hero">
            <div class="container">
                <h1>Chào mừng đến với <span class="highlight">TechZone</span></h1>
                <p>Khám phá những thiết bị công nghệ mới nhất và tốt nhất với giá cả cạnh tranh.</p>
                <a href="/products.html" class="btn btn-primary">Mua sắm ngay</a>
            </div>
        </section>

        <!-- Featured Products -->
        <section class="section">
            <div class="container">
                <h2 class="section-title">Sản phẩm nổi bật</h2>
                <div id="featured-products" class="products-grid">
                    <!-- Products sẽ được load bằng JavaScript -->
                    <div class="loading">Đang tải sản phẩm...</div>
                </div>
            </div>
        </section>

        <!-- API Status -->
        <section class="section section-dark">
            <div class="container">
                <h2 class="section-title">Trạng thái API</h2>
                <div id="api-status" class="api-status">
                    <p>Đang kiểm tra kết nối API...</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <div id="storefront-footer-root"></div>

    <!-- Scripts -->
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/app-layout.js"></script>
<script src="/js/app.js"></script>
<script>
// Gọi hàm để vẽ Header và Footer, báo cho nó biết đang ở trang 'home'
document.addEventListener('DOMContentLoaded', () => {
    initStorefrontLayout({ activePage: 'home' });
});
</script>
</body>

</html>
