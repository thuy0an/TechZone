<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TechZone - Duyệt sản phẩm theo danh mục thiết bị điện tử.">
    <title>Sản phẩm - TechZone</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Header -->
    <div id="storefront-header-root"></div>

    <main>
        <section class="section products-shell" id="products-shell-section">
            <div class="container">
                <div class="page-header">
                    <div>
                        <h1>Danh mục sản phẩm</h1>
                        <p>Chọn danh mục, tìm nhanh sản phẩm và duyệt theo từng trang.</p>
                    </div>
                </div>

                <div class="products-desktop-layout">
                    <aside class="products-sidebar card" id="categories-section">
                        <h3 class="panel-title">Bộ lọc danh mục</h3>
                        <p class="sidebar-note">Chọn 1 danh mục để lọc sản phẩm.</p>
                        <label for="category-select" class="sr-only">Chọn danh mục sản phẩm</label>
                        <select id="category-select" class="category-filter-select" title="Chọn danh mục sản phẩm">
                            <option value="">Đang tải danh mục...</option>
                        </select>

                        <div class="sidebar-filter-group">
                            <label for="brand-select">Thương hiệu</label>
                            <select id="brand-select" class="sidebar-filter-select">
                                <option value="">Tất cả thương hiệu</option>
                            </select>
                        </div>

                        <div class="sidebar-filter-group">
                            <label>Khoảng giá (VND)</label>
                            <div class="price-range-inputs">
                                <input id="min-price-input" class="sidebar-filter-input" type="number" min="0" placeholder="Từ">
                                <input id="max-price-input" class="sidebar-filter-input" type="number" min="0" placeholder="Đến">
                            </div>
                        </div>

                        <div class="sidebar-filter-group">
                            <label for="product-sort-select">Sắp xếp</label>
                            <select id="product-sort-select" class="sidebar-filter-select">
                                <option value="default">Mặc định</option>
                                <option value="name_asc">Tên A-Z</option>
                                <option value="name_desc">Tên Z-A</option>
                                <option value="price_asc">Giá thấp đến cao</option>
                                <option value="price_desc">Giá cao đến thấp</option>
                            </select>
                        </div>

                        <button type="button" class="btn btn-secondary filter-reset-btn" id="filter-reset-btn">
                            Reset bộ lọc
                        </button>
                    </aside>

                    <section class="products-main section-alt card" id="category-products-section">
                        <div class="products-toolbar">
                            <div class="toolbar-search">
                                <label for="product-search-input">Tìm theo tên sản phẩm</label>
                                <input id="product-search-input" type="text" placeholder="Nhập tên sản phẩm..." autocomplete="off">
                            </div>
                        </div>

                        <div class="products-topline">
                            <h2 class="section-title" id="category-products-title">Tất cả sản phẩm</h2>
                        </div>


                        <div id="category-products" class="products-grid">
                            <div class="loading">Chọn một danh mục để xem sản phẩm</div>
                        </div>

                        <div id="pagination-container" class="pagination-wrapper is-hidden"></div>
                    </section>
                </div>
            </div>
        </section>
    </main>

    <div class="product-detail-overlay" id="product-detail-modal" aria-hidden="true">
        <div class="product-detail-modal" role="dialog" aria-modal="true" aria-labelledby="product-detail-title">
            <button class="product-detail-close" type="button" aria-label="Đóng" onclick="closeProductDetail()">✕</button>
            <div class="product-detail-body">
                <div class="product-detail-media">
                    <img id="product-detail-image" src="" alt="Hình ảnh sản phẩm" />
                    <span class="product-detail-stock" id="product-detail-stock"></span>
                </div>
                <div class="product-detail-info">
                    <h3 id="product-detail-title">Đang tải...</h3>
                    <p class="product-detail-brand" id="product-detail-brand"></p>
                    <p class="product-detail-price" id="product-detail-price"></p>
                    <p class="product-detail-quantity" id="product-detail-quantity"></p>
                    <p class="product-detail-description" id="product-detail-description"></p>
                    <div class="product-detail-actions">
                        <div class="quantity-control" id="product-detail-qty-control">
                            <button type="button" class="qty-btn" id="product-detail-qty-minus">-</button>
                            <span class="qty-value" id="product-detail-qty-value">1</span>
                            <button type="button" class="qty-btn" id="product-detail-qty-plus">+</button>
                        </div>
                        <button class="btn btn-secondary" id="product-detail-add" type="button">Thêm vào giỏ</button>
                    </div>
                </div>
            </div>
            <div class="product-detail-specs" id="product-detail-specs">
                <h4>Thông số kỹ thuật</h4>
                <div class="product-detail-specs-list" id="product-detail-specs-list"></div>
            </div>
            <div class="product-related" id="product-related">
                <h4>Gợi ý sản phẩm</h4>
                <div class="product-related-carousel">
                    <button class="carousel-btn prev" type="button" data-carousel="related" aria-label="Xem trước">‹</button>
                    <div class="product-related-grid" id="product-related-list"></div>
                    <button class="carousel-btn next" type="button" data-carousel="related" aria-label="Xem tiếp">›</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div id="storefront-footer-root"></div>

    <!-- Scripts -->
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/app-layout.js"></script>
<script src="js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    initStorefrontLayout({ activePage: 'products' });
});
</script>
</body>

</html>
