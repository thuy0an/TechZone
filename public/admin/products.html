<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Sản phẩm - TechZone Admin</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

    <div class="d-flex">
        <div id="sidebar-placeholder"></div>

        <div class="main-content container pt-5">
            
            <div id="section-list">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="h3 mb-0 text-gray-800">📦 Danh Sách Sản Phẩm</h2>
                    <button onclick="openCreateModal()" class="btn btn-primary">
                        <i class="bi bi-plus-lg"></i> Thêm mới
                    </button>
                </div>

                <div class="card mb-4 shadow-sm">
                    <div class="card-body">
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                            <input type="text" id="searchInput" class="form-control border-start-0" placeholder="Tìm kiếm theo tên hoặc mã SKU...">
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover table-striped align-middle mb-0">
                                <thead class="table-light text-center">
                                    <tr>
                                        <th width="5%">ID</th>
                                        <th width="10%">Ảnh</th>
                                        <th width="15%">Mã SKU</th>
                                        <th width="30%">Tên sản phẩm</th>
                                        <th width="15%">Giá nhập</th>
                                        <th width="10%">Kho</th>
                                        <th width="15%" class="text-center">Hành động</th>
                                    </tr>
                                </thead>
                                <tbody id="productTableBody">
                                    
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div id="section-detail" class="d-none">
                <div class="mb-3">
                    <button onclick="backToList()" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Quay lại
                    </button>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-4 text-center">
                                <img id="d-image" src="" class="img-fluid rounded shadow-sm border" alt="Product Image">
                            </div>
                            
                            <div class="col-md-8">
                                <h3 id="d-name" class="text-primary fw-bold">...</h3>
                                <div class="mb-3">
                                    <span id="d-status"></span>
                                </div>
                                
                                <div class="row g-3">
                                    <div class="col-md-6"><strong>Mã SKU:</strong> <span id="d-code">...</span></div>
                                    <div class="col-md-6"><strong>Thương hiệu:</strong> <span id="d-brand">...</span></div>
                                    <div class="col-md-6"><strong>Danh mục:</strong> <span id="d-category">...</span></div>
                                    <div class="col-md-6"><strong>Tồn kho:</strong> <span id="d-stock" class="fw-bold">...</span></div>
                                </div>
                                <hr>
                                <h4 class="text-danger fw-bold" id="d-price">...</h4>
                                
                                <div class="mt-4">
                                    <h5>⚙️ Thông số kỹ thuật</h5>
                                    <table class="table table-sm table-bordered mt-2">
                                        <tbody id="d-specs"></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Cập nhật sản phẩm</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="editForm">
                        <input type="hidden" id="edit-id">
                        
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Danh mục <span class="text-danger">*</span></label>
                                <select id="edit-category" class="form-select" required>
                                    <option value="">-- Chọn danh mục --</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Thương hiệu</label>
                                <select id="edit-brand" class="form-select">
                                    <option value="">-- Chọn thương hiệu --</option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Tên sản phẩm <span class="text-danger">*</span></label>
                                <input type="text" id="edit-name" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Mã SKU <span class="text-danger">*</span></label>
                                <input type="text" id="edit-code" class="form-control" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Giá nhập (VNĐ) <span class="text-danger">*</span></label>
                                <input type="number" id="edit-price" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Tồn kho <span class="text-danger">*</span></label>
                                <input type="number" id="edit-stock" class="form-control" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Ảnh sản phẩm</label>
                            <div class="d-flex align-items-center gap-3">
                                <img id="edit-preview" src="https://via.placeholder.com/50" class="rounded border" style="width: 60px; height: 60px; object-fit: cover;">
                                <input type="file" id="edit-image" class="form-control" accept="image/*">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Thông số (JSON)</label>
                            <textarea id="edit-specs" class="form-control" rows="3" placeholder='{"CPU": "Core i5", "RAM": "8GB"}'></textarea>
                        </div>

                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="edit-hidden">
                            <label class="form-check-label" for="edit-hidden">Ẩn sản phẩm khỏi web</label>
                        </div>

                        <div class="text-end">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                            <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../js/api.js"></script>

    <script src="../js/admin/common.js"></script> 

    <script src="../js/admin/products.js"></script>
</body>
</html>
