<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TechZone - Cửa hàng công nghệ hàng đầu">
    <title>TechZone - Cửa hàng Công Nghệ</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="favicon.ico">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">
                <span class="logo-icon">🛒</span>
                <span class="logo-text">TechZone</span>
            </a>
            <nav class="nav">
                <a href="index.html" class="nav-link active">Trang chủ</a>
                <a href="products.html" class="nav-link">Sản phẩm</a>
                <a href="cart.html" class="nav-link">Giỏ hàng <span id="cart-count" class="badge">0</span></a>

                <div id="auth-action" style="display: flex; gap: 30px; align-items: center;">
                    <a href="login.html" class="nav-link btn-login">Đăng nhập</a>
                    <a href="register.html" class="nav-link btn-login">Đăng ký</a>
                </div>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <h1>Chào mừng đến với <span class="highlight">TechZone</span></h1>
            <p>Khám phá các sản phẩm công nghệ mới nhất với giá tốt nhất</p>
            <a href="products.html" class="btn btn-primary">Xem sản phẩm</a>
        </div>
    </section>

    <!-- Featured Products -->
    <section class="section">
        <div class="container">
            <h2 class="section-title">Sản phẩm nổi bật</h2>
            <div id="featured-products" class="products-grid">
                <!-- Products sẽ được load bằng JavaScript -->
                <div class="loading">Đang tải sản phẩm...</div>
            </div>
        </div>
    </section>

    <!-- API Status -->
    <section class="section section-dark">
        <div class="container">
            <h2 class="section-title">Trạng thái API</h2>
            <div id="api-status" class="api-status">
                <p>Đang kiểm tra kết nối API...</p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 TechZone. Dự án môn học Web.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
