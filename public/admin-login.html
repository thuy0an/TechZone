<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản trị hệ thống - TechZone</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { 
            background-color: #f4f6f9; 
        } 
        .admin-container { 
            width: 400px; 
            margin: 100px auto; 
            padding: 30px; 
            background: white; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            border-top: 5px solid #dc3545; 
        }
        .btn-admin { 
            background-color: #dc3545; 
            color: white; 
        }
        .btn-admin:hover { 
            background-color: #c82333; 
        }
    </style>
</head>
<body>

<div class="admin-container">
    <h2 style="text-align: center; color: #dc3545;">Hệ Thống Quản Trị</h2>
    <p style="text-align: center; color: #666; font-size: 0.9em;">Dành cho Nhân viên & Quản lý</p>
    
    <form id="adminLoginForm">
        <div class="form-group">
            <label>Email nội bộ</label>
            <input type="email" id="email" required placeholder="admin@techzone.com">
        </div>
        <div class="form-group">
            <label for="password">Mật khẩu</label>
            <input type="password" id="password" required>
        </div>
        
        <div id="message" class="error"></div>
        
        <button type="submit" class="btn-admin" style="width: 100%; padding: 10px; border:none; margin-top:10px; cursor:pointer">
            Đăng nhập vào Admin
        </button>
    </form>
    <p style="text-align: center; margin-top: 20px;">
        <a href="index.html" style="font-size: 0.9em;">← Quay về trang bán hàng</a>
    </p>
</div>

<script src="js/api.js"></script>
<script src="js/admin/admin-auth.js"></script>

</body>
</html>
