<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản - TechZone</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="storefront-header-root"></div>

    <main class="section">
        <div class="container auth-shell">
            <div class="card auth-card">
                <div style="text-align: center; margin-bottom: 30px;">
                    <h1 class="auth-title">Tạo tài khoản</h1>
                    <p class="auth-subtitle">Tham gia cùng TechZone ngay hôm nay</p>
                </div>

                <div id="register-alert" class="alert alert-danger" style="margin-bottom: 20px;"></div>

                <form id="register-form" onsubmit="event.preventDefault(); handleRegister();">
                    <div class="form-group">
                        <label for="name">Họ và tên <span style="color: #ef4444;">*</span></label>
                        <input type="text" id="name" class="form-control" placeholder="VD: Nguyễn Văn A" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email <span style="color: #ef4444;">*</span></label>
                        <input type="email" id="email" class="form-control" placeholder="example@gmail.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Mật khẩu <span style="color: #ef4444;">*</span></label>
                        <input type="password" id="password" class="form-control" placeholder="Tối thiểu 8 ký tự" required>
                    </div>

                    <div class="form-group">
                        <label for="password_confirmation">Xác nhận mật khẩu <span style="color: #ef4444;">*</span></label>
                        <input type="password" id="password_confirmation" class="form-control" placeholder="Nhập lại mật khẩu" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Số điện thoại <span style="color: #ef4444;">*</span></label>
                        <input type="tel" id="phone" class="form-control" placeholder="VD: 0901234567" required>
                    </div>

                    <button type="submit" class="btn btn-login-form" id="btn-submit" style="width: 100%; margin-top: 10px;">
                        Đăng ký ngay
                    </button>
                </form>

                <p style="margin-top: 25px; text-align: center; font-size: 0.95rem;">
                    Đã có tài khoản? <a href="login.html" style="color: var(--primary-color); font-weight: 600;">Đăng nhập</a>
                </p>
            </div>
        </div>
    </main>

    <div id="storefront-footer-root"></div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app-layout.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initStorefrontLayout();
            if (isLoggedIn()) window.location.href = '/';
        });

        async function handleRegister() {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();      
            const password = document.getElementById('password').value;
            const password_confirmation = document.getElementById('password_confirmation').value;
            const btn = document.getElementById('btn-submit');
            const alertBox = document.getElementById('register-alert');

            if (password !== password_confirmation) {
                alertBox.textContent = 'Mật khẩu xác nhận không khớp.';
                alertBox.classList.add('show');
                return;
            }

            if (phone.length < 10 || phone.length > 11) {
                alertBox.textContent = 'Số điện thoại phải từ 10 đến 11 số.';
                alertBox.classList.add('show');
                return;
            }

            alertBox.classList.remove('show');
            btn.disabled = true;
            btn.textContent = 'Đang xử lý...';

            try {
                // Gọi API register đã được định nghĩa trong auth.js
                const response = await registerCustomer({ 
                    name, email, phone, password, password_confirmation 
                });

                showCenteredModal('Đăng ký thành công!', 'Đang chuyển hướng...');
                const redirectTo = sessionStorage.getItem('post_login_redirect') || 'index.html';
                sessionStorage.removeItem('post_login_redirect');
                window.setTimeout(() => {
                    checkAddressAndRedirect(redirectTo);
                }, 800);
            } catch (err) {
                // Nhận lỗi 422 (Unprocessable Entity) hoặc 409 (Conflict) từ Backend
                alertBox.textContent = err.data?.message || 'Đăng ký thất bại. Vui lòng thử lại.';
                alertBox.classList.add('show');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Đăng ký ngay';
            }
        }

        function showCenteredModal(title, message) {
            const overlay = document.getElementById('centered-modal');
            const titleEl = document.getElementById('centered-modal-title');
            const messageEl = document.getElementById('centered-modal-message');
            const confirmBtn = document.getElementById('centered-modal-confirm');
            const cancelBtn = document.getElementById('centered-modal-cancel');

            if (!overlay || !titleEl || !messageEl || !confirmBtn || !cancelBtn) return;

            titleEl.textContent = title || 'Thông báo';
            messageEl.textContent = message || '';
            confirmBtn.textContent = 'Đã hiểu';
            cancelBtn.classList.add('is-hidden');

            overlay.classList.add('is-open');
            overlay.setAttribute('aria-hidden', 'false');
        }
    </script>

    <div class="center-modal" id="centered-modal" aria-hidden="true">
        <div class="center-modal-card" role="dialog" aria-modal="true" aria-labelledby="centered-modal-title">
            <div class="center-modal-header">
                <h3 id="centered-modal-title">Thông báo</h3>
            </div>
            <div class="center-modal-body" id="centered-modal-message"></div>
            <div class="center-modal-actions">
                <button class="btn btn-secondary" type="button" id="centered-modal-cancel">Hủy</button>
                <button class="btn btn-primary" type="button" id="centered-modal-confirm">Đồng ý</button>
            </div>
        </div>
    </div>

    <script>
        const centerOverlay = document.getElementById('centered-modal');
        const centerConfirm = document.getElementById('centered-modal-confirm');
        const centerCancel = document.getElementById('centered-modal-cancel');

        if (centerOverlay) {
            centerOverlay.addEventListener('click', e => {
                if (e.target === centerOverlay) {
                    centerOverlay.classList.remove('is-open');
                    centerOverlay.setAttribute('aria-hidden', 'true');
                }
            });
        }

        if (centerConfirm) {
            centerConfirm.addEventListener('click', () => {
                centerOverlay?.classList.remove('is-open');
                centerOverlay?.setAttribute('aria-hidden', 'true');
            });
        }

        if (centerCancel) {
            centerCancel.addEventListener('click', () => {
                centerOverlay?.classList.remove('is-open');
                centerOverlay?.setAttribute('aria-hidden', 'true');
            });
        }
    </script>
</body>
</html>
