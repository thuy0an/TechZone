<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - TechZone</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">
                <span class="logo-icon">📱</span>
                TechZone
            </a>
            <nav class="nav">
                <a href="index.html" class="nav-link">Trang chủ</a>
                <a href="products.html" class="nav-link">Sản phẩm</a>
            </nav>
        </div>
    </header>

    <main class="section">
        <div class="container auth-shell">
            <div class="card auth-card" style="text-align: center;">
                <h1 class="auth-title" style="margin-bottom: 10px;">Đăng nhập</h1>
                <p class="auth-subtitle" style="margin-bottom: 30px;">Chào mừng trở lại TechZone</p>

                <div id="login-alert" class="alert alert-danger" style="margin-bottom: 20px;"></div>

                <form id="login-form" onsubmit="event.preventDefault(); handleLogin();">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" class="form-control" placeholder="Nhập email của bạn" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Mật khẩu</label>
                        <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu" required>
                    </div>

                    <button type="submit" class="btn btn-login-form" id="btn-submit" style="width: 100%; margin-top: 10px;">
                        Đăng nhập
                    </button>
                </form>

                <p style="margin-top: 25px; font-size: 0.95rem;">
                    Chưa có tài khoản? <a href="register.html" style="color: var(--primary-color); font-weight: 600;">Đăng ký ngay</a>
                    &nbsp;·&nbsp;
                    <a href="#" id="forgot-link" style="color: var(--text-light); font-weight: 500;">Quên mật khẩu?</a>
                </p>
            </div>
        </div>
    </main>

    <!-- Modal quên mật khẩu -->
    <div id="forgot-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:1000; align-items:center; justify-content:center;">
        <div class="card" style="width:100%; max-width:420px; margin:auto; padding:32px; position:relative;">
            <button id="forgot-close" type="button" style="position:absolute; top:14px; right:16px; background:none; border:none; font-size:1.4rem; cursor:pointer; color:var(--text-light);">✕</button>
            <h2 style="margin-bottom:6px; font-size:1.2rem;">Quên mật khẩu</h2>
            <p style="font-size:0.88rem; color:var(--text-light); margin-bottom:20px;">Nhập email và số điện thoại đã đăng ký để đặt lại mật khẩu.</p>

            <div id="forgot-alert" class="alert alert-danger" style="display:none; margin-bottom:16px;"></div>
            <div id="forgot-success" style="display:none; background:rgba(16,185,129,0.12); color:#047857; border:1px solid rgba(16,185,129,0.35); border-radius:10px; padding:12px 14px; margin-bottom:16px; font-size:0.9rem;"></div>

            <form id="forgot-form" onsubmit="event.preventDefault(); handleForgotPassword();">
                <div class="form-group">
                    <label for="forgot-email">Email</label>
                    <input type="email" id="forgot-email" class="form-control" placeholder="Email đã đăng ký" required>
                </div>
                <div class="form-group">
                    <label for="forgot-phone">Số điện thoại</label>
                    <input type="tel" id="forgot-phone" class="form-control" placeholder="Số điện thoại đã đăng ký" required>
                </div>
                <div class="form-group">
                    <label for="forgot-newpass">Mật khẩu mới</label>
                    <input type="password" id="forgot-newpass" class="form-control" placeholder="Tối thiểu 6 ký tự" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="forgot-confirm">Xác nhận mật khẩu mới</label>
                    <input type="password" id="forgot-confirm" class="form-control" placeholder="Nhập lại mật khẩu mới" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary" id="forgot-submit" style="width:100%; margin-top:6px;">Đặt lại mật khẩu</button>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <div class="center-modal" id="centered-modal" aria-hidden="true">
        <div class="center-modal-card" role="dialog" aria-modal="true" aria-labelledby="centered-modal-title">
            <div class="center-modal-header">
                <h3 id="centered-modal-title">Thông báo</h3>
            </div>
            <div class="center-modal-body" id="centered-modal-message"></div>
            <div class="center-modal-actions">
                <button class="btn btn-secondary" type="button" id="centered-modal-cancel">Hủy</button>
                <button class="btn btn-primary" type="button" id="centered-modal-confirm">Đồng ý</button>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (isLoggedIn()) {
                window.location.href = 'index.html';
                return;
            }

            const alertBox = document.getElementById('login-alert');
            const pendingRedirect = sessionStorage.getItem('post_login_redirect');
            if (pendingRedirect && alertBox) {
                alertBox.textContent = 'Vui lòng đăng nhập để sử dụng giỏ hàng.';
                alertBox.style.display = 'block';
            }
        });

        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-submit');
            const alertBox = document.getElementById('login-alert');

            alertBox.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Đang xử lý...';

            try {
                await loginCustomer(email, password);
                const redirectTo = sessionStorage.getItem('post_login_redirect') || '/';
                sessionStorage.removeItem('post_login_redirect');
                showCenteredModal('Đăng nhập thành công!', 'Đang chuyển hướng...');
                window.setTimeout(() => {
                    checkAddressAndRedirect(redirectTo);
                }, 800);
            } catch (err) {
                alertBox.textContent = err.data?.message || err.message || 'Đăng nhập thất bại. Vui lòng thử lại.';
                alertBox.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Đăng nhập';
            }
        }

        function showCenteredModal(title, message) {
            const overlay = document.getElementById('centered-modal');
            const titleEl = document.getElementById('centered-modal-title');
            const messageEl = document.getElementById('centered-modal-message');
            const confirmBtn = document.getElementById('centered-modal-confirm');
            const cancelBtn = document.getElementById('centered-modal-cancel');

            if (!overlay || !titleEl || !messageEl || !confirmBtn || !cancelBtn) return;

            titleEl.textContent = title || 'Thông báo';
            messageEl.textContent = message || '';
            confirmBtn.textContent = 'Đã hiểu';
            cancelBtn.classList.add('is-hidden');

            overlay.classList.add('is-open');
            overlay.setAttribute('aria-hidden', 'false');
        }

        // ── Forgot password modal ──
        const overlay = document.getElementById('forgot-overlay');
        const centerOverlay = document.getElementById('centered-modal');
        const centerConfirm = document.getElementById('centered-modal-confirm');
        const centerCancel = document.getElementById('centered-modal-cancel');

        document.getElementById('forgot-link').addEventListener('click', e => {
            e.preventDefault();
            overlay.style.display = 'flex';
        });

        document.getElementById('forgot-close').addEventListener('click', () => {
            overlay.style.display = 'none';
            document.getElementById('forgot-form').reset();
            document.getElementById('forgot-alert').style.display = 'none';
            document.getElementById('forgot-success').style.display = 'none';
        });

        overlay.addEventListener('click', e => {
            if (e.target === overlay) document.getElementById('forgot-close').click();
        });

        if (centerOverlay) {
            centerOverlay.addEventListener('click', e => {
                if (e.target === centerOverlay) {
                    centerOverlay.classList.remove('is-open');
                    centerOverlay.setAttribute('aria-hidden', 'true');
                }
            });
        }

        if (centerConfirm) {
            centerConfirm.addEventListener('click', () => {
                centerOverlay?.classList.remove('is-open');
                centerOverlay?.setAttribute('aria-hidden', 'true');
            });
        }

        if (centerCancel) {
            centerCancel.addEventListener('click', () => {
                centerOverlay?.classList.remove('is-open');
                centerOverlay?.setAttribute('aria-hidden', 'true');
            });
        }

        async function handleForgotPassword() {
            const email     = document.getElementById('forgot-email').value.trim();
            const phone     = document.getElementById('forgot-phone').value.trim();
            const newPass   = document.getElementById('forgot-newpass').value;
            const confirm   = document.getElementById('forgot-confirm').value;
            const alertBox  = document.getElementById('forgot-alert');
            const successBox = document.getElementById('forgot-success');
            const btn       = document.getElementById('forgot-submit');

            alertBox.style.display = 'none';
            successBox.style.display = 'none';

            if (newPass !== confirm) {
                alertBox.textContent = 'Mật khẩu xác nhận không khớp.';
                alertBox.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Đang xử lý...';

            try {
                const res = await forgotPassword(email, phone, newPass);
                successBox.textContent = res.message || 'Đổi mật khẩu thành công. Vui lòng đăng nhập lại.';
                successBox.style.display = 'block';
                document.getElementById('forgot-form').reset();
                setTimeout(() => document.getElementById('forgot-close').click(), 1000);
            } catch (err) {
                alertBox.textContent = err.data?.message || err.message || 'Thông tin không đúng. Vui lòng kiểm tra lại.';
                alertBox.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Đặt lại mật khẩu';
            }
        }
    </script>
</body>
</html>
