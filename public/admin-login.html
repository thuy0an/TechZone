<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Admin - TechZone</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="login-page">

    <div class="login-card">
        <div class="login-header">
            <div class="mb-3">
                <i class="bi bi-shield-lock-fill text-primary" style="font-size: 3rem;"></i>
            </div>
            <h4 class="fw-bold text-dark">TechZone Admin</h4>
            <p class="text-muted medium">Đăng nhập để vào trang quản trị</p>
        </div>

        <div class="login-body">
            <form id="adminLoginForm">
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                    <label for="email">Địa chỉ Email</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="password" class="form-control" id="password" placeholder="Password" required>
                    <label for="password">Mật khẩu</label>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember">
                        <label class="form-check-label small" for="remember">
                            Ghi nhớ tôi
                        </label>
                    </div>
                </div>
                
                <div id="message" class="mb-3 text-center fw-bold"></div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">
                        Đăng nhập <i class="bi bi-arrow-right-short"></i>
                    </button>
                </div>
            </form>
            
            <div class="text-center mt-4">
                <small class="text-muted">&copy; 2026 TechZone System</small>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="js/api.js"></script>
    <script src="js/admin/admin-auth.js"></script>
</body>
</html>
