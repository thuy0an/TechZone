<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TechZone - Duyệt sản phẩm theo danh mục thiết bị điện tử.">
    <title>Sản phẩm - TechZone</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Header -->
    <div id="storefront-header-root"></div>

    <main>
        <!-- Categories Section -->
        <section class="section" id="categories-section">
            <div class="container">
                <h2 class="section-title">Danh mục sản phẩm</h2>
                <div id="categories-list" class="categories-grid">
                    <div class="loading">Đang tải danh mục...</div>
                </div>
            </div>
        </section>

        <!-- Products by Category Section -->
        <section class="section section-alt" id="category-products-section">
            <div class="container">
                <h2 class="section-title" id="category-products-title">Tất cả sản phẩm</h2>
                <div id="category-products" class="products-grid">
                    <div class="loading">Chọn một danh mục để xem sản phẩm</div>
                </div>
                <!-- Pagination -->
                <div id="pagination-container" class="pagination-wrapper" style="display: none;"></div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <div id="storefront-footer-root"></div>

    <!-- Scripts -->
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/app-layout.js"></script>
<script src="/js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    initStorefrontLayout({ activePage: 'products' });
});
</script>
</body>

</html>
