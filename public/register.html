<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - TechZone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <style>
        body {
            background: linear-gradient(120deg, #a1c4fd 0%, #c2e9fb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .auth-card {
            width: 100%;
            max-width: 500px; 
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            background: white;
        }
        .auth-header {
            background: #198754; 
            padding: 25px;
            text-align: center;
            color: white;
        }
        .auth-body {
            padding: 30px;
        }
        .btn-register {
            background: #198754;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-register:hover {
            background: #157347;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(25, 135, 84, 0.3);
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="auth-header">
            <h3 class="fw-bold mb-0"><i class="bi bi-person-plus-fill me-2"></i>Đăng Ký</h3>
            <p class="mb-0 opacity-75 small">Trở thành thành viên TechZone</p>
        </div>
        
        <div class="auth-body">
            <form id="registerForm">
                <div class="input-group mb-3">
                    <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control p-2" id="name" placeholder="Họ và tên của bạn" required>
                </div>

                <div class="row g-2 mb-3">
                    <div class="col-md-6">
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control p-2" id="email" placeholder="Email" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-phone"></i></span>
                            <input type="text" class="form-control p-2" id="phone" placeholder="Số điện thoại">
                        </div>
                    </div>
                </div>

                <div class="input-group mb-3">
                    <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control p-2" id="password" placeholder="Mật khẩu" required>
                </div>

                <div class="input-group mb-4">
                    <span class="input-group-text bg-light"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" class="form-control p-2" id="password_confirmation" placeholder="Xác nhận mật khẩu" required>
                </div>

                <div id="message" class="text-center text-danger fw-bold mb-3 small"></div>

                <div class="d-grid gap-2 mb-3">
                    <button type="submit" class="btn btn-register border-0">
                        HOÀN TẤT ĐĂNG KÝ
                    </button>
                </div>

                <div class="text-center">
                    <span class="text-muted small">Đã có tài khoản? </span>
                    <a href="login.html" class="text-decoration-none fw-bold text-success">Đăng nhập ngay</a>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
