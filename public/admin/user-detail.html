<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết Khách hàng - TechZone Admin</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <div id="admin-sidebar-root"></div>
        <div class="admin-main">
            <div id="admin-topbar-root"></div>

            <main class="admin-content">
                <div class="page-header" style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <div>
                        <h1>Chi tiết Khách hàng <span id="header-user-name" style="color: var(--admin-accent);"></span></h1>
                        <p>Quản lý thông tin, địa chỉ và lịch sử mua hàng</p>
                    </div>
                    <button class="btn btn-cancel" onclick="window.location.href='users.html'">← Quay lại danh sách</button>
                </div>

                <div class="card" style="margin-bottom: 24px;">
                    <div class="card-header">
                        <h3 class="card-title">Thông tin cơ bản</h3>
                        <span id="user-status-badge" class="badge"></span>
                    </div>
                    <div class="card-body">
                        <form id="user-detail-form" onsubmit="event.preventDefault(); updateUserInfo();">
                            <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;">
                                <div class="form-group">
                                    <label>Họ và tên <span style="color:var(--admin-danger)">*</span></label>
                                    <input type="text" id="ud-name" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label>Email (Không thể sửa)</label>
                                    <input type="email" id="ud-email" class="form-control" disabled style="background: #f8fafc;">
                                </div>
                                <div class="form-group">
                                    <label>Số điện thoại</label>
                                    <input type="text" id="ud-phone" class="form-control">
                                </div>
                            </div>
                            <div style="display: flex; gap: 12px; margin-top: 10px;">
                                <button type="submit" class="btn btn-save" id="btn-update-info">Lưu thông tin</button>
                                <button type="button" class="btn" id="btn-toggle-lock" onclick="toggleUserLock()"></button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card" style="margin-bottom: 24px;">
                    <div class="card-header"><h3 class="card-title">Sổ địa chỉ giao hàng</h3></div>
                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Người nhận</th>
                                    <th>Số điện thoại</th>
                                    <th>Địa chỉ chi tiết</th>
                                    <th>Tỉnh/Huyện/Xã</th>
                                    <th style="width: 100px;">Mặc định</th>
                                </tr>
                            </thead>
                            <tbody id="address-table-body">
                                <tr><td colspan="5" class="table-loading">⏳ Đang tải...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header"><h3 class="card-title">Lịch sử đơn hàng</h3></div>
                    <div class="card-body" style="padding: 16px 24px;">
                        <div class="toolbar" style="flex-wrap: wrap;justify-content:flex-start">
                            <input type="text" id="filter-order-code" class="form-control" style="width: 200px" placeholder="Tìm mã đơn...">
                            <div>
                                <label style="font-size: .9rem; color: var(--text-secondary);">Từ:</label>
                                <input type="date" id="filter-start" class="form-control" style="width: 200px">
                            </div>
                            <div>
                                <label style="font-size: .9rem; color: var(--text-secondary);">Đến:</label>
                                <input type="date" id="filter-end" class="form-control" style="width: 200px">
                            </div>
                            <select id="filter-status" class="form-control" style="width: 250px">
                                <option value="">Tất cả trạng thái</option>
                                <option value="new">Mới</option>
                                <option value="confirmed">Đã xác nhận</option>
                                <option value="shipping">Đang giao</option>
                                <option value="delivered">Đã giao hàng</option>
                                <option value="completed">Hoàn thành</option>
                                <option value="cancelled">Đã hủy</option>
                            </select>
                            <button class="btn btn-add" onclick="currentOrderPage=1; loadUserOrders()">Lọc</button>
                        </div>
                    </div>
                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th style="width:140px">Mã đơn</th>
                                    <th>Ngày đặt</th>
                                    <th>Tổng tiền</th>
                                    <th>Thanh toán</th>
                                    <th>Trạng thái</th>
                                </tr>
                            </thead>
                            <tbody id="order-table-body">
                                <tr><td colspan="5" class="table-loading">⏳ Đang tải...</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="pagination" id="pagination-bar" style="display:none">
                        <div class="pagination-info" id="pagination-info"></div>
                        <div class="pagination-btns" id="pagination-btns"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <div class="toast" id="admin-toast"></div>

    <script src="../js/admin/admin-token.js"></script>
    <script src="../js/admin/admin-api.js"></script>
    <script src="../js/admin/admin-auth.js"></script>
    <script src="../js/admin/admin-layout.js"></script>
    <script src="../js/admin/admin-utils.js"></script>
    <script src="../js/admin/admin-user-detail.js"></script>
</body>
</html>
